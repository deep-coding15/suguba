name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build and deploy
        run: docker compose up -d --build --progress=plain 

      - name: Clean old Docker images
        run: docker image prune -f
